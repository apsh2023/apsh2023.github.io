    url: "mailto:apurva.89.sharma@gmail.com"
    icon: "fas fa-envelope"
  - name: linkedin
    url: "https://www.linkedin.com/in/apurvasharma-b4a4a8207"
    icon: "fab fa-linkedin"
  - name: github
    url: "https://github.com/apsh2023"
    icon: "fab fa-github"